<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Focus Mode - Weak Area Study</title>
<style>
:root {
  --bg:#0f172a; --surface:#1e293b; --surface2:#334155;
  --accent:#3b82f6; --accent2:#8b5cf6; --accent3:#06b6d4;
  --green:#22c55e; --red:#ef4444; --orange:#f59e0b;
  --text:#f1f5f9; --text2:#94a3b8; --text3:#64748b;
  --radius:12px;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
a{color:var(--accent);text-decoration:none;}
a:hover{text-decoration:underline;}

.topbar{background:var(--surface);border-bottom:1px solid var(--surface2);padding:12px 24px;display:flex;align-items:center;gap:16px;position:sticky;top:0;z-index:100;}
.topbar h1{font-size:18px;font-weight:700;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.topbar a.back{background:var(--surface2);color:var(--text2);padding:8px 16px;border-radius:8px;font-size:13px;transition:all .2s;}
.topbar a.back:hover{background:var(--accent);color:#fff;text-decoration:none;}

.container{max-width:900px;margin:0 auto;padding:32px 24px;}
.hidden{display:none !important;}

/* TOPIC SELECTOR */
.selector-section{text-align:center;padding:40px 0 20px;}
.selector-section h2{font-size:28px;margin-bottom:8px;}
.selector-section p{color:var(--text2);margin-bottom:32px;font-size:15px;}

.topic-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:12px;margin-bottom:32px;}
.topic-chip{background:var(--surface);border:2px solid var(--surface2);border-radius:var(--radius);padding:16px 20px;cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:12px;}
.topic-chip:hover{border-color:var(--accent);background:rgba(59,130,246,.05);}
.topic-chip.selected{border-color:var(--accent);background:rgba(59,130,246,.12);}
.topic-chip .icon{font-size:24px;flex-shrink:0;}
.topic-chip .info{text-align:left;}
.topic-chip .info h4{font-size:14px;margin-bottom:2px;}
.topic-chip .info p{font-size:11px;color:var(--text3);margin:0;}
.topic-chip .check{margin-left:auto;width:24px;height:24px;border:2px solid var(--surface2);border-radius:6px;display:flex;align-items:center;justify-content:center;transition:all .2s;flex-shrink:0;font-size:14px;}
.topic-chip.selected .check{background:var(--accent);border-color:var(--accent);color:#fff;}

.btn{background:var(--accent);color:#fff;border:none;padding:12px 32px;border-radius:8px;cursor:pointer;font-size:15px;font-weight:600;transition:all .2s;}
.btn:hover{opacity:.9;transform:translateY(-1px);}
.btn:disabled{opacity:.3;cursor:not-allowed;transform:none;}
.btn.secondary{background:var(--surface2);color:var(--text2);}

.selected-count{font-size:13px;color:var(--text3);margin-bottom:16px;}

/* STUDY CONTENT */
.study-area{margin-top:24px;}
.study-area section{margin-bottom:40px;scroll-margin-top:70px;}
.study-area h2{font-size:22px;margin-bottom:16px;padding-bottom:8px;border-bottom:2px solid var(--surface2);display:flex;align-items:center;gap:10px;}
.study-area h3{font-size:17px;color:var(--accent);margin:20px 0 10px;}
.study-area h4{font-size:14px;color:var(--accent2);margin:14px 0 6px;}
.study-area p{margin-bottom:10px;color:var(--text2);line-height:1.7;}
.study-area strong{color:var(--text);}
.study-area ul,.study-area ol{margin:8px 0 14px 20px;color:var(--text2);}
.study-area li{margin-bottom:5px;line-height:1.6;}
.study-area li strong{color:var(--text);}

table{width:100%;border-collapse:collapse;margin:14px 0;font-size:13px;}
th{background:var(--surface);color:var(--text);text-align:left;padding:8px 12px;border:1px solid var(--surface2);}
td{padding:8px 12px;border:1px solid var(--surface2);color:var(--text2);}

code{background:var(--surface);padding:2px 6px;border-radius:4px;font-size:12px;color:var(--accent3);font-family:'Cascadia Code',Consolas,monospace;}
pre{background:var(--surface);border:1px solid var(--surface2);border-radius:var(--radius);padding:14px;overflow-x:auto;margin:10px 0;font-size:12px;line-height:1.6;}
pre code{background:none;padding:0;color:var(--text2);}

.info-box{background:var(--surface);border:1px solid var(--surface2);border-radius:var(--radius);padding:14px 18px;margin:14px 0;}
.info-box.tip{border-left:4px solid var(--green);}
.info-box.warn{border-left:4px solid var(--orange);}
.info-box.key{border-left:4px solid var(--accent);}
.info-box .box-title{font-size:11px;text-transform:uppercase;letter-spacing:1px;margin-bottom:4px;font-weight:600;}
.info-box.tip .box-title{color:var(--green);}
.info-box.warn .box-title{color:var(--orange);}
.info-box.key .box-title{color:var(--accent);}

/* PROGRESS BAR */
.progress-header{display:flex;justify-content:space-between;align-items:center;background:var(--surface);padding:12px 20px;border-radius:var(--radius);margin-bottom:24px;position:sticky;top:52px;z-index:50;border:1px solid var(--surface2);}
.progress-header .topics-label{font-size:13px;color:var(--text2);}
.progress-header .topics-pills{display:flex;gap:6px;flex-wrap:wrap;}
.progress-header .pill{background:var(--accent);color:#fff;padding:3px 10px;border-radius:12px;font-size:11px;}

@media(max-width:768px){
  .container{padding:16px;}
  .topic-grid{grid-template-columns:1fr;}
}
</style>
</head>

<table>

<pre><code>-- Ranking (for values [10,20,20,30])

// ============================================================
// STATE
// ============================================================
let selectedTopics = new Set();

// ============================================================
// RENDER
// ============================================================
function renderTopicGrid() {
  const grid = document.getElementById('topic-grid');
  grid.innerHTML = Object.entries(topicData).map(([name, data]) => {
    const sel = selectedTopics.has(name) ? 'selected' : '';
    return `<div class="topic-chip ${sel}" onclick="toggleTopic('${name}')">
      <div class="icon">${data.icon}</div>
      <div class="info"><h4>${name}</h4><p>${data.desc}</p></div>
      <div class="check">${sel ? '&#10003;' : ''}</div>
    </div>`;
  }).join('');
  document.getElementById('selected-count').textContent = `${selectedTopics.size} topic${selectedTopics.size !== 1 ? 's' : ''} selected`;
  document.getElementById('start-btn').disabled = selectedTopics.size === 0;
}

function toggleTopic(name) {
  if (selectedTopics.has(name)) selectedTopics.delete(name);
  else selectedTopics.add(name);
  renderTopicGrid();
}

function selectAll() {
  Object.keys(topicData).forEach(k => selectedTopics.add(k));
  renderTopicGrid();
}

function clearAll() {
  selectedTopics.clear();
  renderTopicGrid();
}

function startStudy() {
  if (selectedTopics.size === 0) return;
  // Save selection
  localStorage.setItem('de-focus-topics', JSON.stringify([...selectedTopics]));
  // Render
  document.getElementById('selector-section').classList.add('hidden');
  document.getElementById('study-section').classList.remove('hidden');

  const pills = document.getElementById('focused-pills');
  pills.innerHTML = [...selectedTopics].map(t => `<span class="pill">${t}</span>`).join('');

  const area = document.getElementById('study-area');
  area.innerHTML = [...selectedTopics].map(name => {
    const d = topicData[name];
    return `<section><h2>${d.icon} ${name}</h2>${d.content}</section>`;
  }).join('');
}

function backToSelector() {
  document.getElementById('selector-section').classList.remove('hidden');
  document.getElementById('study-section').classList.add('hidden');
}

// Init — restore previous selection if any
const saved = localStorage.getItem('de-focus-topics');
if (saved) {
  try { JSON.parse(saved).forEach(t => { if (topicData[t]) selectedTopics.add(t); }); } catch {}
}
renderTopicGrid();
</script>
